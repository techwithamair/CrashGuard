<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrashGuard OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#00080f;
  --card-bg:rgba(255,255,255,0.03);
  --border-safe:rgba(0,255,200,0.15);
  --border-warn:rgba(255,170,0,0.45);
  --border-crit:rgba(255,34,68,0.55);
  --accent:#00ffc8;
  --warn:#ffaa00;
  --crit:#ff2244;
  --text-dim:rgba(255,255,255,0.25);
  --text-sub:rgba(255,255,255,0.45);
  --font-mono:'Share Tech Mono',monospace;
  --font-hud:'Orbitron',sans-serif;
}

html,body{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.cg-wrap{
  background:var(--bg);
  border-radius:14px;
  padding:14px;
  font-family:var(--font-mono);
  width:100%;
  max-width:900px;
  border:1px solid rgba(0,255,200,0.06);
  box-shadow:0 0 60px rgba(0,255,200,0.04);
  animation:fadein 0.6s ease both;
}

/* ── HEADER ── */
.cg-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  padding:8px 12px;
  background:rgba(0,255,200,0.03);
  border-radius:8px;
  border:1px solid rgba(0,255,200,0.08);
}
.cg-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:cgpulse 2s infinite;}
.cg-title{font-family:var(--font-hud);font-size:12px;letter-spacing:5px;color:var(--accent);font-weight:700;}
.cg-state{font-size:9px;letter-spacing:3px;color:var(--text-dim);margin-left:4px;}
.cg-clock{margin-left:auto;font-size:12px;color:var(--text-sub);letter-spacing:2px;}

/* ── GRID ── */
.cg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:700px){.cg-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:420px){.cg-grid{grid-template-columns:1fr;}}

/* ── CARD ── */
.cg-card{
  background:var(--card-bg);
  border:1px solid var(--border-safe);
  border-radius:10px;
  padding:12px 10px;
  display:flex;flex-direction:column;align-items:center;
  min-height:230px;position:relative;overflow:hidden;
  transition:border-color 0.35s,box-shadow 0.35s;
}
.cg-card::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,200,0.01) 3px,rgba(0,255,200,0.01) 4px);
  pointer-events:none;
}
.cg-card-label{font-size:8px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;align-self:flex-start;}

.warn-card{border-color:var(--border-warn)!important;box-shadow:0 0 18px rgba(255,170,0,0.08);}
.crit-card{border-color:var(--border-crit)!important;box-shadow:0 0 24px rgba(255,34,68,0.15);animation:cardshake 0.1s infinite;}

/* ── FOOTER ── */
.cg-footer{
  margin-top:10px;padding:7px 10px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;flex-wrap:wrap;gap:14px;
  font-size:8px;color:var(--text-dim);letter-spacing:1px;align-items:center;
}
.cg-footer .pill{color:rgba(0,255,200,0.55);}
.cg-footer-msg{margin-left:auto;color:rgba(255,255,255,0.2);}

.v-div{width:1px;background:rgba(255,255,255,0.07);}
.hud-num{font-family:var(--font-hud);font-weight:700;transition:color 0.3s;color:var(--accent);}
.hud-unit{font-size:7px;color:var(--text-dim);letter-spacing:2px;margin-top:2px;}

/* ── CONNECT BANNER ── */
#conn-banner{
  display:none;
  position:fixed;top:0;left:0;right:0;
  background:#ff2244;color:#fff;
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;
  text-align:center;padding:6px;z-index:999;
}

@keyframes cgpulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes cardshake{0%,100%{transform:translateX(0)}33%{transform:translateX(-1.5px)}66%{transform:translateX(1.5px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="conn-banner">⚠ CONNECTION LOST — RECONNECTING...</div>

<div class="cg-wrap">

  <div class="cg-header">
    <div class="cg-dot" id="hdr-dot"></div>
    <div class="cg-title">CRASHGUARD OS</div>
    <div class="cg-state" id="hdr-state">CONNECTING...</div>
    <div class="cg-clock" id="cg-clock">00:00:00</div>
  </div>

  <div class="cg-grid">

    <!-- CARD 1: ARTIFICIAL HORIZON -->
    <div class="cg-card" id="card-horizon">
      <div class="cg-card-label">Artificial Horizon</div>
      <canvas id="c-horizon" width="130" height="130"></canvas>
      <div id="tilt-deg" class="hud-num" style="font-size:20px;margin-top:8px;">--</div>
      <div class="hud-unit">TILT ANGLE</div>
    </div>

    <!-- CARD 2: G-FORCE GRAPH -->
    <div class="cg-card" id="card-gforce">
      <div class="cg-card-label">G-Force Telemetry</div>
      <canvas id="c-gforce" width="140" height="110" style="width:100%;"></canvas>
      <div style="display:flex;justify-content:space-between;width:100%;margin-top:8px;padding:0 2px;">
        <div style="text-align:center;">
          <div id="g-cur" class="hud-num" style="font-size:22px;">--</div>
          <div class="hud-unit">CURRENT G</div>
        </div>
        <div class="v-div"></div>
        <div style="text-align:center;">
          <div id="g-max" class="hud-num" style="font-size:22px;color:var(--warn);">--</div>
          <div class="hud-unit">PEAK G</div>
        </div>
      </div>
    </div>

    <!-- CARD 3: G-FORCE METER -->
    <div class="cg-card" id="card-gmeter">
      <div class="cg-card-label">G-Force Level</div>
      <canvas id="c-gmeter" width="130" height="130"></canvas>
      <div id="g-status" style="font-size:8px;letter-spacing:3px;color:var(--accent);margin-top:6px;transition:color 0.3s;">NOMINAL</div>
    </div>

    <!-- CARD 4: GPS -->
    <div class="cg-card" id="card-gps">
      <div class="cg-card-label">GPS Location</div>
      <canvas id="c-gps" width="130" height="110"></canvas>
      <div style="width:100%;margin-top:8px;padding:0 4px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <span style="font-size:8px;color:var(--text-dim);letter-spacing:1px;">LAT</span>
          <span id="gps-lat" style="font-size:10px;color:var(--accent);font-family:var(--font-hud);font-weight:700;">--</span>
        </div>
        <div style="height:1px;background:rgba(255,255,255,0.05);margin-bottom:5px;"></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
          <span style="font-size:8px;color:var(--text-dim);letter-spacing:1px;">LON</span>
          <span id="gps-lon" style="font-size:10px;color:var(--accent);font-family:var(--font-hud);font-weight:700;">--</span>
        </div>
        <div style="margin-top:7px;display:flex;align-items:center;gap:6px;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:cgpulse 1.5s infinite;"></div>
          <span style="font-size:7px;color:var(--text-dim);letter-spacing:2px;" id="gps-label">ACQUIRING LOCK...</span>
        </div>
      </div>
    </div>

  </div>

  <div class="cg-footer">
    <span class="pill">● GPS LINKED</span>
    <span class="pill">● IMU ACTIVE</span>
    <span class="pill">● VOICE STANDBY</span>
    <span class="cg-footer-msg" id="footer-msg">CONNECTING TO PI...</span>
  </div>

</div>

<script>
// ── LIVE DATA from Pi (SSE) ──
let liveData = {
  status: 'safe', accel: 0, tilt: 0,
  lat: 0, lon: 0, g_max: 0, footer: ''
};
let gHistory = Array(60).fill(0);
let gpsTrail = [];
let connected = false;
let baseLat = null, baseLon = null;

function connectSSE() {
  const es = new EventSource('/stream');

  es.onopen = () => {
    connected = true;
    document.getElementById('conn-banner').style.display = 'none';
    document.getElementById('hdr-state').textContent = 'SAFE MODE';
  };

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    liveData = d;

    // Set base coords once for map centering
    if (baseLat === null && d.lat) { baseLat = d.lat; baseLon = d.lon; }

    // Update GPS trail
    gpsTrail.push({ lat: d.lat, lon: d.lon });
    if (gpsTrail.length > 80) gpsTrail.shift();

    // Update G history
    gHistory.push(d.accel);
    if (gHistory.length > 60) gHistory.shift();

    applyState(d);
  };

  es.onerror = () => {
    connected = false;
    document.getElementById('conn-banner').style.display = 'block';
    document.getElementById('hdr-state').textContent = 'DISCONNECTED';
    es.close();
    setTimeout(connectSSE, 3000); // retry
  };
}

connectSSE();

// ── CLOCK ──
function tickClock() {
  const n = new Date();
  document.getElementById('cg-clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
setInterval(tickClock, 1000); tickClock();

// ── APPLY STATE ──
function applyState(d) {
  const ac = accentColor(d);
  const state = d.status; // "safe" | "warn" | "critical"

  // Header
  const stateLabels = { safe:'SAFE MODE', warn:'WARNING — HIGH G', critical:'CRITICAL — IMPACT' };
  const dotColors   = { safe:'#00ffc8',   warn:'#ffaa00',          critical:'#ff2244' };
  document.getElementById('hdr-state').textContent = stateLabels[state] || state.toUpperCase();
  document.getElementById('hdr-dot').style.background = dotColors[state] || '#00ffc8';

  // Cards
  ['card-horizon','card-gforce','card-gmeter','card-gps'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('warn-card','crit-card');
    if (state === 'warn')     el.classList.add('warn-card');
    if (state === 'critical') el.classList.add('crit-card');
  });

  // Numbers
  document.getElementById('tilt-deg').textContent = d.tilt.toFixed(1) + '°';
  document.getElementById('tilt-deg').style.color  = ac;
  document.getElementById('g-cur').textContent     = d.accel.toFixed(2);
  document.getElementById('g-cur').style.color     = ac;
  document.getElementById('g-max').textContent     = d.g_max.toFixed(2);
  document.getElementById('g-status').textContent  = state === 'critical' ? 'CRITICAL' : state === 'warn' ? 'WARNING' : 'NOMINAL';
  document.getElementById('g-status').style.color  = ac;
  document.getElementById('gps-lat').textContent   = d.lat ? d.lat.toFixed(4) : '--';
  document.getElementById('gps-lat').style.color   = ac;
  document.getElementById('gps-lon').textContent   = d.lon ? d.lon.toFixed(4) : '--';
  document.getElementById('gps-lon').style.color   = ac;
  document.getElementById('gps-label').textContent = d.lat ? 'SAT LOCK — RUSTON LA' : 'ACQUIRING LOCK...';
  document.getElementById('footer-msg').textContent = d.footer || 'TELEMETRY NOMINAL';
}

function accentColor(d) {
  if (d.status === 'critical') return '#ff2244';
  if (d.status === 'warn')     return '#ffaa00';
  return '#00ffc8';
}
function accentRGB(c) {
  return c==='#ff2244'?'255,34,68':c==='#ffaa00'?'255,170,0':'0,255,200';
}

// ── HORIZON ──
const hC = document.getElementById('c-horizon'), hX = hC.getContext('2d');
function drawHorizon() {
  const W=130,H=130,cx=65,cy=65,r=58;
  const tilt = liveData.tilt || 0;
  const state = liveData.status;
  hX.clearRect(0,0,W,H);
  hX.save();
  hX.beginPath(); hX.arc(cx,cy,r,0,Math.PI*2); hX.clip();
  const rad = tilt * Math.PI / 180;
  hX.save(); hX.translate(cx,cy); hX.rotate(rad);
  hX.fillStyle = state==='critical'?'#1a000a':state==='warn'?'#150d00':'#061828';
  hX.fillRect(-r,-r,r*2,r);
  hX.fillStyle = state==='critical'?'#2a0010':state==='warn'?'#1a1000':'#0a1e0e';
  hX.fillRect(-r,0,r*2,r);
  hX.strokeStyle='rgba(255,255,255,0.55)'; hX.lineWidth=1.5;
  hX.beginPath(); hX.moveTo(-r,0); hX.lineTo(r,0); hX.stroke();
  for(let i=1;i<4;i++){
    hX.strokeStyle='rgba(255,255,255,0.07)'; hX.lineWidth=1;
    hX.beginPath(); hX.moveTo(-r,-i*14); hX.lineTo(r,-i*14); hX.stroke();
    hX.beginPath(); hX.moveTo(-r,i*14);  hX.lineTo(r,i*14);  hX.stroke();
  }
  hX.restore();
  const ac = accentColor(liveData);
  hX.strokeStyle=ac; hX.lineWidth=2;
  hX.beginPath(); hX.moveTo(cx-28,cy); hX.lineTo(cx-8,cy); hX.lineTo(cx-8,cy+7); hX.stroke();
  hX.beginPath(); hX.moveTo(cx+28,cy); hX.lineTo(cx+8,cy); hX.lineTo(cx+8,cy+7); hX.stroke();
  hX.beginPath(); hX.arc(cx,cy,3,0,Math.PI*2); hX.fillStyle=ac; hX.fill();
  hX.restore();
  hX.beginPath(); hX.arc(cx,cy,r,0,Math.PI*2);
  hX.strokeStyle='rgba(255,255,255,0.12)'; hX.lineWidth=1.5; hX.stroke();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2-Math.PI/2;
    const r1=i%3===0?r-7:r-4;
    hX.beginPath();
    hX.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    hX.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    hX.strokeStyle=i%3===0?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.1)';
    hX.lineWidth=1; hX.stroke();
  }
}

// ── G-FORCE GRAPH ──
const gC = document.getElementById('c-gforce'), gX = gC.getContext('2d');
function drawGGraph() {
  const W=gC.width, H=gC.height;
  gX.clearRect(0,0,W,H);
  for(let i=1;i<4;i++){
    gX.beginPath(); gX.moveTo(0,H*i/4); gX.lineTo(W,H*i/4);
    gX.strokeStyle='rgba(255,255,255,0.04)'; gX.lineWidth=1; gX.stroke();
  }
  gX.fillStyle='rgba(255,255,255,0.15)'; gX.font='7px "Share Tech Mono"';
  gX.textAlign='left';
  gX.fillText('3G',2,9); gX.fillText('1.5G',2,H/2+4); gX.fillText('0G',2,H-2);
  const ac=accentColor(liveData), rgb=accentRGB(ac);
  gX.beginPath();
  gHistory.forEach((v,i) => {
    const x=(i/(gHistory.length-1))*W;
    const y=H-(v/3.5)*H;
    i===0?gX.moveTo(x,y):gX.lineTo(x,y);
  });
  gX.strokeStyle='rgba('+rgb+',0.9)'; gX.lineWidth=1.5; gX.stroke();
  const last=gHistory[gHistory.length-1];
  gX.lineTo(W,H); gX.lineTo(0,H); gX.closePath();
  const fill=gX.createLinearGradient(0,0,0,H);
  fill.addColorStop(0,'rgba('+rgb+',0.18)'); fill.addColorStop(1,'rgba('+rgb+',0)');
  gX.fillStyle=fill; gX.fill();
  const ty=H-(1.2/3.5)*H;
  gX.beginPath(); gX.moveTo(0,ty); gX.lineTo(W,ty);
  gX.strokeStyle='rgba(255,170,0,0.25)'; gX.lineWidth=1;
  gX.setLineDash([3,3]); gX.stroke(); gX.setLineDash([]);
}

// ── G-METER ──
const mC = document.getElementById('c-gmeter'), mX = mC.getContext('2d');
function drawGMeter() {
  const cx=65,cy=72,r=52;
  const gCur = liveData.accel || 0;
  mX.clearRect(0,0,130,130);
  const startA=Math.PI*0.75, endA=Math.PI*2.25, span=endA-startA;
  mX.beginPath(); mX.arc(cx,cy,r,startA,endA);
  mX.strokeStyle='rgba(255,255,255,0.06)'; mX.lineWidth=10; mX.lineCap='round'; mX.stroke();
  const pct=Math.min(gCur/3.5,1);
  if(pct>0){
    const curEnd=startA+span*pct;
    const ac=accentColor(liveData), rgb=accentRGB(ac);
    mX.beginPath(); mX.arc(cx,cy,r,startA,curEnd);
    mX.strokeStyle=ac; mX.lineWidth=10; mX.lineCap='round'; mX.stroke();
    const gx=cx+Math.cos(curEnd)*r, gy=cy+Math.sin(curEnd)*r;
    const rg=mX.createRadialGradient(gx,gy,0,gx,gy,14);
    rg.addColorStop(0,'rgba('+rgb+',0.8)'); rg.addColorStop(1,'rgba('+rgb+',0)');
    mX.beginPath(); mX.arc(gx,gy,14,0,Math.PI*2); mX.fillStyle=rg; mX.fill();
  }
  for(let i=0;i<=7;i++){
    const a=startA+span*(i/7);
    mX.beginPath();
    mX.moveTo(cx+Math.cos(a)*(r-8),cy+Math.sin(a)*(r-8));
    mX.lineTo(cx+Math.cos(a)*(r+2),cy+Math.sin(a)*(r+2));
    mX.strokeStyle='rgba(255,255,255,0.3)'; mX.lineWidth=1.5; mX.stroke();
    if(i%2===0){
      const v=(i/7*3.5).toFixed(1);
      mX.fillStyle='rgba(255,255,255,0.25)'; mX.font='7px "Share Tech Mono"'; mX.textAlign='center';
      mX.fillText(v+'G',cx+Math.cos(a)*(r-20),cy+Math.sin(a)*(r-20)+3);
    }
  }
  const ac=accentColor(liveData);
  mX.font='bold 22px "Orbitron",sans-serif'; mX.textAlign='center'; mX.fillStyle=ac;
  mX.fillText(gCur.toFixed(2),cx,cy+8);
  mX.font='8px "Share Tech Mono"'; mX.fillStyle='rgba(255,255,255,0.2)';
  mX.fillText('G-FORCE',cx,cy+22);
}

// ── GPS MAP ──
const mapC = document.getElementById('c-gps'), mapX = mapC.getContext('2d');
function drawGPSMap() {
  const W=130,H=110;
  mapX.clearRect(0,0,W,H);
  mapX.fillStyle='rgba(0,255,200,0.025)'; mapX.fillRect(0,0,W,H);
  for(let i=0;i<=5;i++){
    mapX.beginPath(); mapX.moveTo(i*(W/5),0); mapX.lineTo(i*(W/5),H);
    mapX.strokeStyle='rgba(0,255,200,0.07)'; mapX.lineWidth=1; mapX.stroke();
  }
  for(let i=0;i<=4;i++){
    mapX.beginPath(); mapX.moveTo(0,i*(H/4)); mapX.lineTo(W,i*(H/4));
    mapX.strokeStyle='rgba(0,255,200,0.07)'; mapX.lineWidth=1; mapX.stroke();
  }
  const cx=65,cy=55,scale=800000;
  const bLat=baseLat||liveData.lat||32.5232;
  const bLon=baseLon||liveData.lon||-92.6379;
  if(gpsTrail.length>1){
    mapX.beginPath();
    gpsTrail.forEach((p,i)=>{
      const px=cx+(p.lon-bLon)*scale;
      const py=cy-(p.lat-bLat)*scale;
      i===0?mapX.moveTo(px,py):mapX.lineTo(px,py);
    });
    mapX.strokeStyle='rgba(0,255,200,0.3)'; mapX.lineWidth=1.5; mapX.stroke();
  }
  const ac=accentColor(liveData), rgb=accentRGB(ac);
  mapX.beginPath(); mapX.arc(cx,cy,5,0,Math.PI*2); mapX.fillStyle=ac; mapX.fill();
  mapX.beginPath(); mapX.arc(cx,cy,10,0,Math.PI*2); mapX.strokeStyle=ac+'66'; mapX.lineWidth=1.5; mapX.stroke();
  mapX.beginPath(); mapX.arc(cx,cy,18,0,Math.PI*2); mapX.strokeStyle=ac+'22'; mapX.lineWidth=1; mapX.stroke();
}

// ── RENDER LOOP (canvas only, DOM updated via SSE) ──
function renderLoop() {
  drawHorizon();
  drawGGraph();
  drawGMeter();
  drawGPSMap();
  requestAnimationFrame(renderLoop);
}

// ── INIT ──
setTimeout(() => {
  const gc2  = document.getElementById('c-gforce');
  const card = document.getElementById('card-gforce');
  gc2.width  = card.clientWidth - 22;
  gc2.height = 110;
  renderLoop();
}, 150);
</script>
</body>
</html>
